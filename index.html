<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Think👉Act 考える力の🌱</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 20px;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Yu Gothic",
        Meiryo,
        sans-serif;
      background: #f7faf7;
      color: #333;
    }

    .container {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 28px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    }

    .title-area {
      display: flex;
      justify-content: center;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 36px;
      text-align: center;
    }

    .main-title {
      margin: 0;
      font-size: clamp(32px, 7vw, 56px);
      line-height: 1.2;
    }

    .sub-title {
      margin: 0;
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 600;
      line-height: 1.4;
    }

    .introduction {
      margin-bottom: 36px;
    }

    .introduction h2 {
      margin: 0 0 20px;
      font-size: 24px;
      text-align: center;
    }

    .introduction p {
      margin: 0;
      font-size: 17px;
      line-height: 2;
    }

    .menu {
      display: grid;
      gap: 16px;
    }

    .menu a {
      display: block;
      padding: 16px 20px;
      border-radius: 12px;
      text-align: center;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      background: #e8f3e8;
      color: #244624;
      transition: transform 0.2s, background 0.2s;
    }

    .menu a:hover {
      transform: translateY(-2px);
      background: #dcefdc;
    }

    @media (max-width: 600px) {
      body {
        padding: 20px 14px;
      }

      .container {
        padding: 32px 20px;
      }

      .title-area {
        gap: 10px;
      }

      .introduction p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="container">

    <header class="title-area">
      <h1 class="main-title">Think👉Act</h1>
      <p class="sub-title">考える力の🌱</p>
    </header>

    <section class="introduction">
      <h2>コンテンツ紹介</h2>

      <p>
        Think👉Actは、看護師として状況を判断し、適切に報告を行うために必要な思考力を段階的に身につけることを目的としたＷｅｂ教材です。
        初級・中級・上級の３段階で構成されており、毎日５分程度の学習を積み重ねることで、状況に応じて考え、優先順位を判断し、相手に伝える力を育むよう設計しています。
        「考える」ことを習慣化し、臨床現場で自然に判断・行動できる力を身につけられるよう支援します。
      </p>
    </section>

    <nav class="menu">
      <a href="quiiz_beginner_v2.html">🌱 初級を始める</a>
      <a href="quiz_intermediate_v3.html">🌿 中級を始める</a>
      <a href=quiz_advanced_v2.html">🔥 上級を始める</a>
    </nav>

  </main>
</body>
</html>
