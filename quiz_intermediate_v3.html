<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Andante 中級編 Ver.3.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;background:#f5f5f0;color:#1a1a1a;padding:16px;font-size:15px}.wrap{max-width:520px;margin:0 auto}.prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:16px}.prog-bar{flex:1;height:6px;border-radius:3px;background:#e0e0e0;overflow:hidden}.prog-fill{height:100%;background:#f59e0b;border-radius:3px;transition:width .35s}.prog-label{font-size:13px;color:#666;white-space:nowrap}.card{background:#fff;border-radius:14px;border:1px solid #e5e5e5;padding:16px;margin-bottom:14px}.badge{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:#fef3c7;color:#b45309;margin-bottom:10px}.stage-title{font-size:20px;font-weight:800;margin-bottom:10px;line-height:1.4}.scenario{font-size:13px;line-height:1.8;color:#555}.note{background:#fffbeb;border:1px solid #fcd34d;color:#92400e;border-radius:12px;padding:13px 14px;margin-bottom:14px;font-size:13px;line-height:1.7}.patient-list{display:flex;flex-direction:column;gap:10px}.patient-card{background:#fff;border:1.5px solid #d1d5db;border-radius:12px;padding:13px;display:grid;grid-template-columns:42px 1fr auto;gap:10px;align-items:center}.rank{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fef3c7;color:#b45309;font-weight:800;font-size:16px}.patient-name{font-weight:700;font-size:14px;margin-bottom:5px}.patient-info{font-size:13px;color:#555;line-height:1.6}.move-buttons{display:flex;flex-direction:column;gap:6px}.move-btn{width:38px;min-width:38px;padding:8px 0;border-radius:9px;border:1px solid #d1d5db;background:#fff;font-size:16px;font-weight:700;cursor:pointer}.move-btn:disabled{opacity:.3;cursor:default}.additional-box{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:14px;margin-top:10px}.additional-item{padding:10px 0;border-bottom:1px dashed #bbf7d0}.additional-item:last-child{border-bottom:none}.additional-name{font-weight:700;color:#166534;margin-bottom:4px}.additional-text{font-size:13px;color:#333;line-height:1.7}textarea{width:100%;min-height:150px;resize:vertical;border:1.5px solid #d1d5db;border-radius:12px;padding:12px;font-family:inherit;font-size:14px;line-height:1.7}textarea:focus{outline:none;border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.12)}.label{display:block;font-size:14px;font-weight:700;margin-bottom:8px}.small{font-size:12px;color:#777;line-height:1.6;margin-top:7px}.btn-row{display:flex;gap:10px;margin-top:4px}button.main,button.sub{flex:1;font-size:15px;font-weight:700;padding:13px;border-radius:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}button.main{background:#f59e0b;color:#fff;border:1.5px solid #f59e0b}button.main:active{background:#d97706}button.sub{background:#fff;color:#1a1a1a;border:1.5px solid #d1d5db}button.sub:active{background:#f0f0f0}.compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.compare-box{border:1px solid #e5e5e5;border-radius:12px;padding:12px;background:#fafafa}.compare-title{font-size:12px;color:#777;margin-bottom:7px;font-weight:700}.compare-line{font-size:13px;line-height:1.7}.result-wrap{text-align:center;padding:26px 8px}.result-icon{font-size:46px;margin-bottom:8px}.result-title{font-size:22px;font-weight:800;margin-bottom:10px}.result-msg{font-size:14px;color:#555;line-height:1.8}@media(max-width:420px){.patient-card{grid-template-columns:38px 1fr auto;padding:11px}.compare{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div><span class="prog-label" id="progLabel">1 / 5</span></div>
  <div id="mainArea"></div>
  <div class="btn-row"><button class="sub" id="backBtn" onclick="goBack()">戻る</button><button class="main" id="nextBtn" onclick="handleNext()">次へ →</button></div>
</div>
<script>
var cases=[
{scene:"夜勤帯、3名の患者について同時に対応が必要になりました。現時点で得られている情報だけで、医師へ報告する優先順位を考えてください。",patients:[{id:"A",name:"患者A",initial:"胸痛と冷汗を訴えています。意識は清明です。",additional:"12誘導心電図でST上昇が疑われ、血圧は92/58mmHgでした。"},{id:"B",name:"患者B",initial:"経管栄養後に咳き込みがみられました。",additional:"SpO₂が94％から88％へ低下し、湿性嗄声があります。"},{id:"C",name:"患者C",initial:"点滴ルートの閉塞アラームが鳴っています。",additional:"抗菌薬投与中ですが、刺入部の腫脹や発赤はありません。"}]},
{scene:"日勤帯、3名の患者から同時に訴えや異常の連絡がありました。まず誰から報告するか考えてください。",patients:[{id:"A",name:"患者A",initial:"術後2日目で創部痛を訴えています。",additional:"鎮痛薬投与後も痛みが増強し、ドレーン排液が急に鮮血へ変化しています。"},{id:"B",name:"患者B",initial:"38.2℃の発熱があります。",additional:"悪寒戦慄があり、血圧84/46mmHg、脈拍124回/分です。"},{id:"C",name:"患者C",initial:"退院指導について質問があります。",additional:"全身状態に変化はなく、家族が来院中です。"}]},
{scene:"夜勤帯、モニターやナースコールが重なりました。初期情報から報告の優先順位を決めてください。",patients:[{id:"A",name:"患者A",initial:"心房細動の既往があり、脈拍110回/分です。",additional:"胸部不快感が出現し、脈拍148回/分、血圧88/54mmHgです。"},{id:"B",name:"患者B",initial:"認知症があり、ベッドから降りようとしています。",additional:"スタッフが付き添っており、現在はベッド上で落ち着いています。"},{id:"C",name:"患者C",initial:"尿量が少ないとナースコールがありました。",additional:"6時間で尿量40mL、口渇が強く、血圧96/60mmHgです。"}]},
{scene:"日勤帯、検査結果と患者の訴えが同時に入りました。現時点の優先順位を考えてください。",patients:[{id:"A",name:"患者A",initial:"検査室からカリウム高値の連絡がありました。",additional:"K 6.8mEq/Lで、モニター上に幅広いQRS波がみられます。"},{id:"B",name:"患者B",initial:"食事中にむせ込みがありました。",additional:"食事は中止済みですが、SpO₂ 90％で呼吸音に左右差があります。"},{id:"C",name:"患者C",initial:"便秘が3日続いています。",additional:"腹部膨満はありますが、嘔吐や強い腹痛はありません。"}]},
{scene:"夜勤帯、処置中の患者を含む3名に変化がありました。報告する順番を考えてください。",patients:[{id:"A",name:"患者A",initial:"透析中に血圧が低下しました。",additional:"除水を停止しても血圧76/42mmHg、冷汗と意識レベル低下があります。"},{id:"B",name:"患者B",initial:"酸素2L投与中でSpO₂ 92％です。",additional:"呼吸数32回/分、努力呼吸があり、SpO₂ 86％へ低下しました。"},{id:"C",name:"患者C",initial:"点滴終了予定時刻を過ぎています。",additional:"輸液は残り50mLで、全身状態に変化はありません。"}]}
];
var currentCase=0,stage="initial",currentOrder=[],initialOrder=[],revisedOrder=[],rationales=[];
function clonePatients(){return cases[currentCase].patients.map(function(p){return{id:p.id,name:p.name,initial:p.initial,additional:p.additional};});}
function shuffle(array){var copied=array.slice();for(var i=copied.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),tmp=copied[i];copied[i]=copied[j];copied[j]=tmp;}return copied;}
function render(){var area=document.getElementById("mainArea");area.innerHTML="";document.getElementById("prog").style.width=Math.round(currentCase/cases.length*100)+"%";document.getElementById("progLabel").textContent=(currentCase+1)+" / "+cases.length;if(stage==="initial")renderInitial(area);else if(stage==="additional")renderAdditional(area);else if(stage==="reorder")renderReorder(area);else if(stage==="reason")renderReason(area);else if(stage==="review")renderReview(area);else if(stage==="result")renderResult(area);updateButtons();}
function renderHeader(area,title,description){var card=document.createElement("div");card.className="card";card.innerHTML='<div class="badge">Andante 中級編 Ver.3.0</div><div class="stage-title">'+title+'</div><p class="scenario">'+description+'</p>';area.appendChild(card);}
function renderInitial(area){renderHeader(area,"① 初期情報で優先順位を考える",cases[currentCase].scene);var note=document.createElement("div");note.className="note";note.innerHTML="現在わかっている情報だけで考えてください。<br>上にある患者ほど、先に報告する想定です。";area.appendChild(note);if(currentOrder.length===0)currentOrder=shuffle(clonePatients());area.appendChild(createPatientList("initial"));}
function renderAdditional(area){renderHeader(area,"② カルテから追加情報を確認","カルテを確認したところ、次の情報が入力されていました。");var box=document.createElement("div");box.className="additional-box";cases[currentCase].patients.forEach(function(p){var item=document.createElement("div");item.className="additional-item";item.innerHTML='<div class="additional-name">'+p.name+'</div><div class="additional-text">'+p.additional+'</div>';box.appendChild(item);});var card=document.createElement("div");card.className="card";card.appendChild(box);area.appendChild(card);var note=document.createElement("div");note.className="note";note.innerHTML="<strong>最初の順番と違っていても問題ありません。</strong><br>臨床現場では、情報収集後に優先順位が変わることがあります。";area.appendChild(note);}
function renderReorder(area){renderHeader(area,"③ 追加情報を踏まえて再検討","もう一度、医師へ報告する優先順位を考えてください。");var note=document.createElement("div");note.className="note";note.innerHTML="上にある患者ほど、先に報告する想定です。<br>正解を当てるのではなく、判断の変化を確認してください。";area.appendChild(note);area.appendChild(createPatientList("additional"));}
function renderReason(area){renderHeader(area,"④ 判断した根拠を整理する","追加情報を踏まえて、この順番にした理由を記載してください。");var card=document.createElement("div");card.className="card";var label=document.createElement("label");label.className="label";label.setAttribute("for","reason");label.textContent="判断した根拠";var textarea=document.createElement("textarea");textarea.id="reason";textarea.placeholder="例）\n・患者Aは血圧低下と意識レベル低下があり、循環不全の危険が高いと考えた。\n・患者Bも低酸素状態だが、患者Aを最優先と判断した。";textarea.value=rationales[currentCase]||"";textarea.oninput=function(){rationales[currentCase]=this.value;};var small=document.createElement("div");small.className="small";small.textContent="箇条書きでも構いません。特に判断に影響した情報と、その理由を書いてください。";card.appendChild(label);card.appendChild(textarea);card.appendChild(small);area.appendChild(card);var note=document.createElement("div");note.className="note";note.innerHTML="この問題は、唯一の正解を求めるものではありません。<br>「なぜそのように考えたか」を言葉にして整理することが目的です。";area.appendChild(note);}
function renderReview(area){renderHeader(area,"⑤ 自分の判断を振り返る","初期判断と、追加情報後の判断を見比べてください。");var card=document.createElement("div");card.className="card";var compare=document.createElement("div");compare.className="compare";var before=document.createElement("div");before.className="compare-box";before.innerHTML='<div class="compare-title">初期判断</div>'+initialOrder.map(function(p,i){return'<div class="compare-line">'+(i+1)+'位　'+p.name+'</div>';}).join("");var after=document.createElement("div");after.className="compare-box";after.innerHTML='<div class="compare-title">追加情報後</div>'+revisedOrder.map(function(p,i){return'<div class="compare-line">'+(i+1)+'位　'+p.name+'</div>';}).join("");compare.appendChild(before);compare.appendChild(after);card.appendChild(compare);var reasonBox=document.createElement("div");reasonBox.style.cssText="margin-top:14px;padding-top:14px;border-top:1px solid #e5e5e5";reasonBox.innerHTML='<div class="compare-title">判断した根拠</div><div class="compare-line" style="white-space:pre-wrap">'+escapeHtml(rationales[currentCase]||"")+'</div>';card.appendChild(reasonBox);area.appendChild(card);}
function renderResult(area){document.getElementById("prog").style.width="100%";document.getElementById("progLabel").textContent="完了！";var card=document.createElement("div");card.className="card";card.innerHTML='<div class="result-wrap"><div class="result-icon">🌱</div><div class="result-title">トレーニング完了</div><div class="result-msg">正解・不正解ではなく、情報を集め、判断を見直し、根拠を言葉にする練習ができました。<br>Poco a poco se llega lejos.</div></div>';area.appendChild(card);}
function createPatientList(infoType){var list=document.createElement("div");list.className="patient-list";currentOrder.forEach(function(p,index){var card=document.createElement("div");card.className="patient-card";var rank=document.createElement("div");rank.className="rank";rank.textContent=index+1;var body=document.createElement("div");body.innerHTML='<div class="patient-name">'+p.name+'</div><div class="patient-info">'+(infoType==="initial"?p.initial:p.initial+'<br><strong>追加：</strong>'+p.additional)+'</div>';var buttons=document.createElement("div");buttons.className="move-buttons";var up=document.createElement("button");up.className="move-btn";up.type="button";up.textContent="↑";up.disabled=index===0;up.onclick=function(){moveItem(index,-1);};var down=document.createElement("button");down.className="move-btn";down.type="button";down.textContent="↓";down.disabled=index===currentOrder.length-1;down.onclick=function(){moveItem(index,1);};buttons.appendChild(up);buttons.appendChild(down);card.appendChild(rank);card.appendChild(body);card.appendChild(buttons);list.appendChild(card);});return list;}
function moveItem(index,direction){var newIndex=index+direction;if(newIndex<0||newIndex>=currentOrder.length)return;var temp=currentOrder[index];currentOrder[index]=currentOrder[newIndex];currentOrder[newIndex]=temp;render();}
function handleNext(){if(stage==="initial"){initialOrder=currentOrder.map(function(p){return p;});stage="additional";render();return;}if(stage==="additional"){currentOrder=initialOrder.map(function(p){return p;});stage="reorder";render();return;}if(stage==="reorder"){revisedOrder=currentOrder.map(function(p){return p;});stage="reason";render();return;}if(stage==="reason"){var reason=(rationales[currentCase]||"").trim();if(reason===""){alert("判断した根拠を入力してください。");return;}stage="review";render();return;}if(stage==="review"){if(currentCase<cases.length-1){currentCase++;stage="initial";currentOrder=[];initialOrder=[];revisedOrder=[];render();}else{stage="result";render();}return;}if(stage==="result")location.reload();}
function goBack(){if(stage==="initial")return;if(stage==="additional"){currentOrder=initialOrder.map(function(p){return p;});stage="initial";}else if(stage==="reorder")stage="additional";else if(stage==="reason"){currentOrder=revisedOrder.map(function(p){return p;});stage="reorder";}else if(stage==="review")stage="reason";render();}
function updateButtons(){var back=document.getElementById("backBtn"),next=document.getElementById("nextBtn");back.style.display=(stage==="initial"||stage==="result")?"none":"";if(stage==="initial")next.textContent="この順番で進む →";else if(stage==="additional")next.textContent="再度、優先順位を考える →";else if(stage==="reorder")next.textContent="根拠を記載する →";else if(stage==="reason")next.textContent="判断を振り返る →";else if(stage==="review")next.textContent=currentCase<cases.length-1?"次の問題へ →":"完了する →";else if(stage==="result")next.textContent="もう一度挑戦する →";}
function escapeHtml(text){return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#039;");}
render();
</script>
</body>
</html>
